<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Agent — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d1a;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Background accent */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(233,69,96,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(99,102,241,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #161625;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 64px rgba(0,0,0,0.6),
        0 4px 16px rgba(0,0,0,0.4);
      position: relative;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: #e94560;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(233,69,96,0.35);
    }
    .logo-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .logo-text p {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }

    /* ── Tab switcher ── */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .tab.active {
      background: #1a1a2e;
      color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    /* ── Form ── */
    .form-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .form-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus {
      border-color: #e94560;
      background: rgba(255,255,255,0.09);
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(233,69,96,0.12);
      border: 1px solid rgba(233,69,96,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      color: #f87171;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .error-msg.visible { display: flex; }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #e94560;
      border: none;
      border-radius: 11px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(233,69,96,0.3);
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; }
    .btn-submit:active:not(:disabled) { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      margin: 20px 0 0;
    }
    .divider a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      cursor: pointer;
    }
    .divider a:hover { color: #fff; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">📝</div>
    <div class="logo-text">
      <h1>Notes Agent</h1>
      <p>Your personal AI notebook</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Log in</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Create account</button>
  </div>

  <!-- Login form -->
  <div id="view-login">
    <p class="form-title">Welcome back</p>
    <p class="form-subtitle">Sign in to access your notes.</p>

    <div class="error-msg" id="login-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="login-error-text"></span>
    </div>

    <form id="form-login" onsubmit="submitLogin(event)">
      <div class="field">
        <label for="login-username">Username</label>
        <input id="login-username" type="text" placeholder="your-username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn-submit" id="btn-login" type="submit">
        <div class="spinner"></div>
        <span class="btn-label">Sign in</span>
      </button>
    </form>

    <p class="divider">No account? <a onclick="switchTab('register')">Create one</a></p>
  </div>

  <!-- Register form -->
  <div id="view-register" style="display:none">
    <p class="form-title">Create account</p>
    <p class="form-subtitle">Pick a username and password to get started.</p>

    <div class="error-msg" id="register-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="register-error-text"></span>
    </div>

    <form id="form-register" onsubmit="submitRegister(event)">
      <div class="field">
        <label for="reg-username">Username</label>
        <input id="reg-username" type="text" placeholder="your-username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password" required />
      </div>
      <div class="field">
        <label for="reg-confirm">Confirm password</label>
        <input id="reg-confirm" type="password" placeholder="Repeat password" autocomplete="new-password" required />
      </div>
      <button class="btn-submit" id="btn-register" type="submit">
        <div class="spinner"></div>
        <span class="btn-label">Create account</span>
      </button>
    </form>

    <p class="divider">Already have an account? <a onclick="switchTab('login')">Sign in</a></p>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem("token")) {
    window.location.replace("/");
  }

  function switchTab(tab) {
    document.getElementById("view-login").style.display    = tab === "login"    ? "" : "none";
    document.getElementById("view-register").style.display = tab === "register" ? "" : "none";
    document.getElementById("tab-login").classList.toggle("active",    tab === "login");
    document.getElementById("tab-register").classList.toggle("active", tab === "register");
    // Clear errors on switch
    setError("login", "");
    setError("register", "");
  }

  function setError(form, msg) {
    const el   = document.getElementById(form + "-error");
    const text = document.getElementById(form + "-error-text");
    text.textContent = msg;
    el.classList.toggle("visible", !!msg);
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.classList.toggle("loading", loading);
  }

  async function submitLogin(e) {
    e.preventDefault();
    setError("login", "");
    setLoading("btn-login", true);

    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    try {
      const res  = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        setError("login", data.error ?? "Login failed.");
        return;
      }

      localStorage.setItem("token",    data.token);
      localStorage.setItem("username", data.username);
      window.location.replace("/");
    } catch {
      setError("login", "Network error — is the server running?");
    } finally {
      setLoading("btn-login", false);
    }
  }

  async function submitRegister(e) {
    e.preventDefault();
    setError("register", "");

    const username = document.getElementById("reg-username").value.trim();
    const password = document.getElementById("reg-password").value;
    const confirm  = document.getElementById("reg-confirm").value;

    if (password !== confirm) {
      setError("register", "Passwords do not match.");
      return;
    }

    setLoading("btn-register", true);

    try {
      const res  = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        setError("register", data.error ?? "Registration failed.");
        return;
      }

      localStorage.setItem("token",    data.token);
      localStorage.setItem("username", data.username);
      window.location.replace("/");
    } catch {
      setError("register", "Network error — is the server running?");
    } finally {
      setLoading("btn-register", false);
    }
  }
</script>

</body>
</html>
