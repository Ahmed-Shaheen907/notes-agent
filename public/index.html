<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 100dvh;
      max-height: 820px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 18px 24px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      background: #e94560;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-left: auto;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #94a3b8;
      text-align: center;
      padding: 40px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 8px; }
    .empty-state h2 { font-size: 16px; font-weight: 600; color: #64748b; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* Message bubbles */
    .message { display: flex; gap: 10px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.agent { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.user .avatar  { background: #1a1a2e; color: #fff; }
    .message.agent .avatar { background: #f1f5f9; color: #1a1a2e; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user  .bubble { background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
    .message.agent .bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }
    .typing-bubble span {
      width: 7px;
      height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 20px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      color: #1e293b;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #1a1a2e; }
    textarea::placeholder { color: #94a3b8; }

    button {
      width: 42px;
      height: 42px;
      background: #1a1a2e;
      border: none;
      border-radius: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:active:not(:disabled) { transform: scale(0.95); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button svg { fill: #fff; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="header-icon">📝</div>
    <div>
      <h1>Notes Agent</h1>
      <p>Powered by Gemini</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty">
      <div class="icon">🗒️</div>
      <h2>Your personal notes assistant</h2>
      <p>
        Save, search, update, and delete notes through natural conversation.<br>
        Try: <em>"Save a note: meeting moved to Friday, tag it work"</em>
      </p>
    </div>
  </div>

  <div class="input-bar">
    <textarea
      id="input"
      placeholder="Ask anything about your notes…"
      rows="1"
    ></textarea>
    <button id="send" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  // Each page load gets a fresh sessionId so conversations are isolated per tab.
  const sessionId = crypto.randomUUID();

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send");
  const emptyEl    = document.getElementById("empty");

  let isLoading = false;

  // ── Auto-resize textarea ───────────────────────────────────────────────────
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // ── Send on Enter (Shift+Enter = newline) ──────────────────────────────────
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener("click", sendMessage);

  // ── Message rendering ──────────────────────────────────────────────────────
  function addMessage(role, text) {
    // Hide the empty state on first message
    if (emptyEl) emptyEl.style.display = "none";

    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "U" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function addTypingIndicator() {
    if (emptyEl) emptyEl.style.display = "none";

    const wrapper = document.createElement("div");
    wrapper.className = "message agent";
    wrapper.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble typing-bubble";
    bubble.innerHTML = "<span></span><span></span><span></span>";

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    document.getElementById("typing")?.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send a message ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    addMessage("user", text);
    addTypingIndicator();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, sessionId }),
      });

      const data = await res.json();
      removeTypingIndicator();

      if (!res.ok) {
        addMessage("agent", "Error: " + (data.error ?? "Something went wrong."));
      } else {
        addMessage("agent", data.response);
      }
    } catch (err) {
      removeTypingIndicator();
      addMessage("agent", "Network error — is the server running?");
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
