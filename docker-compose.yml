services:
  notes-agent:
    build: .
    image: notes-agent
    ports:
      - "3000:3000"   # http://localhost:3000 on your machine → port 3000 in container
    environment:
      # docker-compose automatically reads your .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEFAULT_USER=${DEFAULT_USER:-default}
    volumes:
      # SQLite database persists on your machine even after the container stops
      - ./data:/app/data
