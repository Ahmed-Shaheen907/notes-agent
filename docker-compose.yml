services:
  notes-agent:
    build: .
    image: notes-agent
    ports:
      - "3000:3000"   # http://localhost:3000 on your machine → port 3000 in container
    environment:
      # docker-compose reads your .env file automatically
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - PORT=3000
    volumes:
      # SQLite database persists on your machine even after the container stops
      - ./data:/app/data
